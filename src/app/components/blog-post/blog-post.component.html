<div class="post-container">
  <!-- Top Navigation Back Button -->
  <header class="post-header-nav">
    <button routerLink="/" class="rainbow-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>Back to Home</span>
    </button>
  </header>

  @if (isLoading()) {
    <!-- Skeleton Post Loading State -->
    <article class="post-skeleton">
      <div class="skeleton-meta skeleton"></div>
      <div class="skeleton-title skeleton"></div>
      <div class="skeleton-line skeleton"></div>
      <div class="skeleton-line skeleton"></div>
      <div class="skeleton-line skeleton" style="width: 80%;"></div>
    </article>
  } @else {
    <!-- Real Blog Post content -->
    <article class="post-article">
      <header class="post-meta">
        @if (currentPost(); as post) {
          <span class="post-date">{{ post.publishedAt | date:'MMMM d, yyyy' }}</span>
          <h1 class="post-title">{{ post.title }}</h1>
        }
      </header>

      <section class="post-content markdown-body" [innerHTML]="postContent()"></section>
    </article>
  }
</div>
