@if (post(); as p) {
  <a [routerLink]="['/blog', p.slug]" class="post-card-link">
    <article class="post-card rainbow-card">
      <span class="post-date">{{ p.publishedAt | date: 'MMMM d, yyyy' }}</span>
      <h3 class="post-title">{{ p.title }}</h3>
      <p class="post-excerpt">{{ p.excerpt }}</p>
    </article>
  </a>
} @else {
  <article class="post-card skeleton-card">
    <div class="skeleton-date skeleton"></div>
    <div class="skeleton-title skeleton"></div>
    <div class="skeleton-excerpt skeleton"></div>
  </article>
}
